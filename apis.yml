aid: voiio
name: Voiio
description: >-
  Voiio is a German employee assistance and work-life balance platform,
  positioning itself as "#1 in Work-Life-Balance" in the German market.
  The platform provides employee support across all life stages (family planning,
  childcare, eldercare, personal wellness, career support) through digital
  services, coaching, live lectures, expert referrals, and a 24/7 accessible
  portal. Integration with employer systems is available via Magic Links
  (authenticated deep-link URLs) and a white-label customization approach.
  No public REST API or developer portal has been identified; integrations
  are enterprise-contract based.
